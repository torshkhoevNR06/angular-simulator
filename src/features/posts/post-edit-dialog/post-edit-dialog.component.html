<form [formGroup]="editPostForm" class="card flex justify-center">
  <span class="p-text-secondary block mb-8">Please update the post information.</span>
  <div class="flex items-center gap-4 mb-4">
    <label for="title" class="font-semibold w-24">Title</label>
    <input formControlName="title" pInputText id="title" class="flex-auto" autocomplete="off" />
  </div>
  <div class="flex items-center gap-4 mb-8">
    <label for="tags" class="font-semibold w-24">Tags</label>
    <input formControlName="tags" pInputText id="tags" class="flex-auto" autocomplete="off" />
  </div>
  <div class="flex items-center gap-4 mb-8">
    <label for="views" class="font-semibold w-24">Views</label>
    <input formControlName="views" pInputText id="views" class="flex-auto" autocomplete="off" />
  </div>
  <div class="flex justify-end gap-2">
    <p-button label="Cancel" severity="secondary" (onClick)="closeModal()" />
    <p-button label="Save" (onClick)="editPost()" />
  </div>
</form>
